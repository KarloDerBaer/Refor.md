<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Fonts are bundled locally via @fontsource (1.9) -->
  <title>refor.md – Read, Comment, Refine</title>
</head>

<body>
  <!-- Titlebar for frameless electron window -->
  <div id="titlebar">
    <div class="titlebar-left">
      <!-- Logo instead of text -->
      <div class="app-logo">
        <svg width="18" height="18" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logo-bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse"><stop stop-color="#30333A"/><stop offset="1" stop-color="#14161B"/></linearGradient>
            <linearGradient id="logo-paper" x1="126" y1="86" x2="386" y2="406" gradientUnits="userSpaceOnUse"><stop stop-color="#FCF7ED"/><stop offset="1" stop-color="#ECE2D2"/></linearGradient>
            <linearGradient id="logo-bubble" x1="104" y1="278" x2="284" y2="388" gradientUnits="userSpaceOnUse"><stop stop-color="#5CD2CA"/><stop offset="1" stop-color="#238E88"/></linearGradient>
            <linearGradient id="logo-badge" x1="294" y1="286" x2="407" y2="410" gradientUnits="userSpaceOnUse"><stop stop-color="#F0B75A"/><stop offset="1" stop-color="#C88723"/></linearGradient>
          </defs>
          <rect x="32" y="32" width="448" height="448" rx="108" fill="url(#logo-bg)"/>
          <path d="M126 118C126 100.327 140.327 86 158 86H326L386 146V374C386 391.673 371.673 406 354 406H158C140.327 406 126 391.673 126 374V118Z" fill="url(#logo-paper)"/>
          <path d="M326 86V122C326 135.255 336.745 146 350 146H386L326 86Z" fill="#D8CCB8"/>
          <rect x="166" y="160" width="132" height="18" rx="9" fill="#4A4F59" fill-opacity="0.88"/>
          <rect x="166" y="202" width="180" height="16" rx="8" fill="#8A8F98" fill-opacity="0.6"/>
          <rect x="166" y="234" width="154" height="16" rx="8" fill="#8A8F98" fill-opacity="0.6"/>
          <rect x="166" y="266" width="168" height="16" rx="8" fill="#8A8F98" fill-opacity="0.6"/>
          <path d="M104 308C104 291.431 117.431 278 134 278H254C270.569 278 284 291.431 284 308V358C284 374.569 270.569 388 254 388H182L142 418V388H134C117.431 388 104 374.569 104 358V308Z" fill="url(#logo-bubble)"/>
          <circle cx="160" cy="333" r="12" fill="#E8FFFD"/><circle cx="194" cy="333" r="12" fill="#E8FFFD"/><circle cx="228" cy="333" r="12" fill="#E8FFFD"/>
          <circle cx="350" cy="348" r="66" fill="url(#logo-badge)"/>
          <path d="M325.907 375.454L336.725 336.302L365.438 307.589C369.497 303.53 376.078 303.53 380.137 307.589L390.411 317.863C394.47 321.922 394.47 328.503 390.411 332.562L361.698 361.275L322.546 372.093C320.074 372.776 317.224 370.926 317.907 368.454" stroke="#FFF9EC" stroke-width="8" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="title">refor.md</span>
      <button id="btn-title-favorite" class="icon-btn title-star no-drag" title="Favorite">
        <i data-lucide="star"></i>
      </button>
    </div>

    <!-- Center: Edit, Comment, Search -->
    <div class="titlebar-center">
      <button id="btn-edit-toggle" class="toolbar-btn no-drag" title="Toggle edit mode (Ctrl+E)">
        <i data-lucide="pen-line"></i>
      </button>
      <button id="btn-comment-toggle" class="toolbar-btn no-drag" title="Toggle comment mode (Ctrl+K)">
        <i data-lucide="message-square"></i>
      </button>
      <div class="search-bar no-drag">
        <i data-lucide="search"></i>
        <input type="text" id="search-input" placeholder="Search... (Ctrl+F)" />
        <span id="search-counter" class="search-counter"></span>
      </div>
      <button id="btn-show-commits" class="toolbar-btn no-drag" title="Show comments in text">
        <i data-lucide="eye"></i> Comments
      </button>
      <button id="btn-power-editor" class="toolbar-btn no-drag" title="Raw Markdown Editor (Ctrl+Shift+E)">
        <i data-lucide="file-code-2"></i> RAW
      </button>
    </div>

    <!-- Right: Window Controls -->
    <div class="titlebar-right">
      <div class="window-controls-system no-drag">
        <button id="btn-minimize">—</button>
        <button id="btn-maximize">□</button>
        <button id="btn-close">×</button>
      </div>
    </div>
  </div>

  <!-- Formatting Toolbar (visible in edit/power-editor mode) (3.4) -->
  <div id="format-toolbar" class="format-toolbar hidden">
    <button data-format="bold" title="Bold (Ctrl+B)"><i data-lucide="bold"></i></button>
    <button data-format="italic" title="Italic (Ctrl+I)"><i data-lucide="italic"></i></button>
    <button data-format="strikethrough" title="Strikethrough"><i data-lucide="strikethrough"></i></button>
    <span class="fmt-divider"></span>
    <button data-format="h1" title="Heading 1" class="fmt-text-btn">H1</button>
    <button data-format="h2" title="Heading 2" class="fmt-text-btn">H2</button>
    <button data-format="h3" title="Heading 3" class="fmt-text-btn">H3</button>
    <span class="fmt-divider"></span>
    <button data-format="ul" title="Bullet list"><i data-lucide="list"></i></button>
    <button data-format="ol" title="Numbered list"><i data-lucide="list-ordered"></i></button>
    <button data-format="checklist" title="Checklist"><i data-lucide="list-checks"></i></button>
    <span class="fmt-divider"></span>
    <button data-format="link" title="Link (Ctrl+L)"><i data-lucide="link"></i></button>
    <button data-format="image" title="Insert image"><i data-lucide="image"></i></button>
    <button data-format="code" title="Inline code"><i data-lucide="code"></i></button>
    <button data-format="codeblock" title="Code block"><i data-lucide="square-code"></i></button>
    <button data-format="quote" title="Quote"><i data-lucide="quote"></i></button>
    <button data-format="hr" title="Horizontal rule"><i data-lucide="minus"></i></button>
    <span class="fmt-divider"></span>
    <button id="btn-emoji-picker" data-format="emoji" title="Insert emoji"><i data-lucide="smile"></i></button>
    <div id="emoji-picker" class="emoji-picker hidden"></div>
  </div>

  <!-- Main App Container -->
  <div class="app-container">

    <!-- Left Sidebar (Icons & Menus) -->
    <nav id="left-sidebar">
      <div class="sidebar-top">
        <!-- Add Document -->
        <button id="btn-new-file" class="icon-btn" title="New file (Ctrl+N)">
          <i data-lucide="plus"></i>
        </button>

        <!-- Open Folder -->
        <button id="btn-open-folder" class="icon-btn" title="Open file (Ctrl+O)">
          <i data-lucide="folder"></i>
        </button>

        <!-- Save -->
        <button id="menu-save" class="icon-btn" title="Save (Ctrl+S)">
          <i data-lucide="save"></i>
        </button>

        <!-- Recents -->
        <button id="btn-recents" class="icon-btn" title="Recent files">
          <i data-lucide="clock"></i>
        </button>
        <!-- Favorites -->
        <button id="btn-favorites" class="icon-btn" title="Favorites">
          <i data-lucide="star"></i>
        </button>
        <!-- Table of Contents (3.7) -->
        <button id="btn-toc" class="icon-btn" title="Table of Contents">
          <i data-lucide="list-tree"></i>
        </button>
      </div>

      <div class="sidebar-bottom">
        <!-- Hamburger Menu -->
        <button id="btn-main-menu" class="icon-btn" title="Menu">
          <i data-lucide="menu"></i>
        </button>

        <!-- Hidden Menu Popover -->
        <div id="main-menu-popover" class="hidden">
          <button id="menu-theme">Toggle Theme</button>
          <button id="menu-export-pdf">Export as PDF</button>
          <button id="menu-export-html">Export as HTML</button>
          <button id="menu-print">Print (Ctrl+P)</button>
          <button id="menu-spellcheck">Spellcheck: Off</button>
          <button id="menu-new-window">New Window</button>
          <button id="menu-report-bug">Report a Bug</button>
          <button id="menu-exit">Exit</button>
        </div>
      </div>
    </nav>

    <!-- Flyout Panels for Recents/Favorites -->
    <div id="sidebar-flyout" class="hidden">
      <div class="flyout-header">
        <span id="flyout-title">Title</span>
        <button id="btn-close-flyout"><i data-lucide="x"></i></button>
      </div>
      <ul id="flyout-list"></ul>
    </div>
    <!-- Flyout Resizer Handle -->
    <div id="flyout-resizer" class="hidden"></div>

    <!-- Right Column: Content -->
    <div class="main-column">
      <!-- Markdown Content & Power Editor -->
      <div class="app-layout">

        <!-- Left Editor Group -->
        <div class="editor-group" id="editor-group-left">
          <div id="tab-bar" class="tab-bar-group">
            <div class="tab-bar-actions">
              <button id="btn-new-tab" class="tab-add-btn" title="New Tab (Ctrl+T)">
                <i data-lucide="plus" style="width: 14px; height: 14px;"></i>
              </button>
              <button id="btn-raw-left" class="tab-add-btn" title="RAW Markdown (Ctrl+Shift+E)">
                <i data-lucide="file-code-2" style="width: 14px; height: 14px;"></i>
              </button>
              <button id="btn-split-left" class="tab-add-btn" title="Split View">
                <i data-lucide="columns-2" style="width: 14px; height: 14px;"></i>
              </button>
            </div>
          </div>
          <div class="breadcrumb-bar" id="breadcrumb-left"></div>
          <div id="app"></div>
        </div>

        <!-- Split Resizer -->
        <div id="split-resizer" class="resizer hidden"></div>

        <!-- Right Editor Group (Split View) -->
        <div class="editor-group hidden" id="editor-group-right">
          <div id="tab-bar-right" class="tab-bar-group">
            <div class="tab-bar-actions">
              <button id="btn-new-tab-right" class="tab-add-btn" title="New Tab">
                <i data-lucide="plus" style="width: 14px; height: 14px;"></i>
              </button>
              <button id="btn-raw-right" class="tab-add-btn" title="RAW Markdown">
                <i data-lucide="file-code-2" style="width: 14px; height: 14px;"></i>
              </button>
              <button id="btn-split-right" class="tab-add-btn" title="Split View">
                <i data-lucide="columns-2" style="width: 14px; height: 14px;"></i>
              </button>
            </div>
          </div>
          <div class="breadcrumb-bar" id="breadcrumb-right"></div>
          <div id="app-right"></div>
        </div>

      </div>

      <!-- Status Bar -->
      <div id="status-bar">
        <span class="status-item" id="status-zoom">100%</span>
        <span class="status-item" id="status-words">0 Words</span>
        <span class="status-item" id="status-chars">0 Characters</span>
      </div>

    </div> <!-- /main-column -->
  </div> <!-- /app-container -->

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
